gui:
  nerdFontsVersion: "3"
  showFileIcons: true
  showFileTree: true
  border: rounded
  sidePanelWidth: 0.25
  mainPanelSplitMode: flexible
  splitDiff: auto
  theme:
    activeBorderColor:
      - "#b4befe"
      - bold
    inactiveBorderColor:
      - "#585b70"
    selectedLineBgColor:
      - "#313244"
    optionsTextColor:
      - "#89b4fa"
git:
  pagers:
    - pager: delta --paging=never
      colorArg: always
    - pager: env FORCE_COLOR=3 git-split-diffs --color
      colorArg: never
