gui:
  nerdFontsVersion: "3"
  showFileIcons: true
  showFileTree: true
  border: rounded
  sidePanelWidth: 0.25
  mainPanelSplitMode: flexible
  splitDiff: auto
  theme:
    activeBorderColor:
      - "#b4befe"
      - bold
    inactiveBorderColor:
      - "#585b70"
    selectedLineBgColor:
      - "#313244"
    optionsTextColor:
      - "#89b4fa"
git:
  pagers:
    - pager: delta --paging=never
      colorArg: always
    - pager: env FORCE_COLOR=3 git-split-diffs --color
      colorArg: never
customCommands:
  - key: "v"
    context: "localBranches"
    description: "PR checkout"
    loadingText: "Checking out PR..."
    command: "gh pr checkout {{.Form.PRNumber}}"
    prompts:
      - type: "menuFromCommand"
        title: "Select PR"
        key: "PRNumber"
        command: >-
          gh pr list --json number,title,headRefName,updatedAt --template '{{range .}}{{printf "#%v: %s - %s (%s)\n" .number .title .headRefName (timeago .updatedAt)}}{{end}}'
        filter: '#(?P<number>[0-9]+): (?P<title>.+) - (?P<ref_name>[^ ]+).*'
        valueFormat: '{{.number}}'
        labelFormat: '{{"#" | black | bold}}{{.number | white | bold}} {{.title | yellow | bold}} {{.ref_name | green}}'
  - key: "D"
    context: "localBranches"
    description: "PR diff"
    command: "gh pr diff {{.SelectedLocalBranch.Name}}"
    output: "terminal"
  - key: "A"
    context: "localBranches"
    description: "PR approve"
    command: "gh pr review {{.SelectedLocalBranch.Name}} --approve"
    prompts:
      - type: "confirm"
        title: "Approve PR"
        body: "Approve this PR?"
  - key: "M"
    context: "localBranches"
    description: "PR merge"
    command: "gh pr merge {{.SelectedLocalBranch.Name}}"
    output: "terminal"
  - key: "G"
    context: "localBranches"
    description: "Open PR in browser"
    command: "gh pr view -w {{.SelectedLocalBranch.Name}}"
