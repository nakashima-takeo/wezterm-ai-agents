# (claude の /wezterm-ai-agents:supervise・codex の $supervise と同じ役割)。
description = "WezTerm の監督対象エージェント群を見守るオーケストレーターを開始する"
prompt = """
あなたはこのセッションで WezTerm 並列 AI エージェントの監督オーケストレーターになる。
