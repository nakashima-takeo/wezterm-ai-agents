name: Release MCP binaries

# v* タグの push で MCP サーバーを OS/arch 別にクロスビルドし、その Release に添付する。
# プラグイン(claude/codex/gemini)はこのプリビルドを取得して使う(ローカルの go build 不要)。
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent-plugin/mcp/go.mod
      - name: Build wezterm-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
        working-directory: agent-plugin/mcp
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o "wezterm-mcp-${{ matrix.goos }}-${{ matrix.goarch }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: wezterm-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent-plugin/mcp/wezterm-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # その tag の Release にバイナリを添付する。Release が無ければ作成、有れば追加。
      # 本文(リリースノート)は触らない(別途 generate_release_notes での生成を尊重)。
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/wezterm-mcp-*
          fail_on_unmatched_files: true
